        // Custom Synthesized Audio Engine (No external dependencies)
        const playSound = (type) => {
            try {
                const ctx = new (window.AudioContext || window.webkitAudioContext)();
                const osc = ctx.createOscillator();
                const gain = ctx.createGain();
                
                osc.connect(gain);
                gain.connect(ctx.destination);
                
                if (type === 'success') {
                    osc.type = 'triangle';
                    osc.frequency.setValueAtTime(330, ctx.currentTime); 
                    osc.frequency.exponentialRampToValueAtTime(660, ctx.currentTime + 0.3); 
                    gain.gain.setValueAtTime(0.15, ctx.currentTime);
                    gain.gain.linearRampToValueAtTime(0.01, ctx.currentTime + 0.3);
                    osc.start();
                    osc.stop(ctx.currentTime + 0.32);
                } else if (type === 'error') {
                    osc.type = 'sawtooth';
                    osc.frequency.setValueAtTime(150, ctx.currentTime);
                    osc.frequency.linearRampToValueAtTime(80, ctx.currentTime + 0.4);
                    gain.gain.setValueAtTime(0.2, ctx.currentTime);
                    gain.gain.linearRampToValueAtTime(0.01, ctx.currentTime + 0.45);
                    osc.start();
                    osc.stop(ctx.currentTime + 0.45);
                } else if (type === 'click') {
                    osc.type = 'sine';
                    osc.frequency.setValueAtTime(500, ctx.currentTime);
                    gain.gain.setValueAtTime(0.1, ctx.currentTime);
                    gain.gain.exponentialRampToValueAtTime(0.01, ctx.currentTime + 0.08);
                    osc.start();
                    osc.stop(ctx.currentTime + 0.1);
                } else if (type === 'level-up') {
                    const now = ctx.currentTime;
                    osc.type = 'square';
                    osc.frequency.setValueAtTime(261.63, now); 
                    osc.frequency.setValueAtTime(329.63, now + 0.1); 
                    osc.frequency.setValueAtTime(392.00, now + 0.2); 
                    osc.frequency.setValueAtTime(523.25, now + 0.3); 
                    gain.gain.setValueAtTime(0.1, now);
                    gain.gain.linearRampToValueAtTime(0.1, now + 0.4);
                    gain.gain.linearRampToValueAtTime(0.01, now + 0.6);
                    osc.start();
                    osc.stop(now + 0.6);
                }
            } catch (e) {
                console.log("Audio contexts aren't fully active yet or not supported.");
            }
        };

                        setBattleState('win');

The user is in "Free Study" mode. You are ready to discuss Zohar passages, Kabbalistic concepts (Sephirot, Tzimtzum, Sitra Achra), mystical interpretations of Genesis, or Hebrew/Aramaic vocabulary related to Kabbalah.
Always respond in high-quality, friendly, and accessible modern Hebrew (RTL). Maintain a respectful, Socratic, and deep tone, asking guiding questions about the spiritual paths and secrets.

                                                        <div className="bg-slate-950/60 border border-slate-850 p-4 rounded-2xl rounded-tr-none text-gray-400 text-xs flex items-center gap-2">
                                                            <div className="w-1.5 h-1.5 bg-amber-500 rounded-full animate-bounce"></div>
                                                            <div className="w-1.5 h-1.5 bg-amber-500 rounded-full animate-bounce [animation-delay:0.2s]"></div>
                                                            <div className="w-1.5 h-1.5 bg-amber-500 rounded-full animate-bounce [animation-delay:0.4s]"></div>
                                                            <span>החברותא חושב...</span>
                                                        </div>
                                                    </div>
                                                )}
                                            </div>

                                            {/* Chat Input form */}
                                            <form onSubmit={handleSendMessage} className="flex gap-3 border-t border-slate-800/60 pt-4 shrink-0">
                                                <input
                                                    type="text"
                                                    value={userChatInput}
                                                    onChange={(e) => setUserChatInput(e.target.value)}
                                                    disabled={isGenerating}
                                                    placeholder="כתוב הודעה לחברותא הדיגיטלי..."
                                                    className="flex-grow bg-slate-950 border border-slate-800/80 rounded-2xl py-3 px-4 text-white text-sm focus:outline-none focus:border-amber-500 transition-all placeholder-gray-600"
                                                />
                                                <button
                                                    type="submit"
                                                    disabled={!userChatInput.trim() || isGenerating}
                                                    className={`px-6 py-3.5 rounded-2xl font-black text-sm transition-all flex items-center gap-2 ${
                                                        !userChatInput.trim() || isGenerating
                                                            ? 'bg-slate-800 text-gray-500 cursor-not-allowed'
                                                            : `${currentSub.btnClass}`
                                                    }`}
                                                >
                                                    <span>שלח</span>
                                                    <i className="fa-solid fa-paper-plane-rtl"></i>
                                                </button>
                                            </form>
                                        </div>
                                    </div>
                                )}
                            </div>
                        )}
                    </main>

                    {/* Footer */}
                    <footer className="border-t border-gray-800 bg-[#0f172a] py-6 px-6 text-center text-xs text-gray-500">
                        <div className="max-w-7xl mx-auto space-y-2">
                            <p>© 2026 Spark. כל הזכויות שמורות לבית המדרש הדיגיטלי החדש.</p>
                            <p>נבנה באהבה להנגשת ארון הספרים היהודי לדור הבא 📖✨</p>
                        </div>
                    </footer>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
